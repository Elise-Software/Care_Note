<!doctype html>
<html lang="ko">
  <head><meta charset="utf-8" /><title>WaveLab engine contract test</title></head>
  <body>
    <script src="../src/engine.js"></script>
    <script>
      (function () {
        const failures = [];
        const check = (condition, message) => { if (!condition) failures.push(message); };
        const sources = [
          { id: "manual-memo", type: "manual", label: "진료 후 메모", text: "혈압약은 아침 식후 복용. 7월 28일 오전에 다시 방문.", confirmed: true },
          { id: "vision-image", type: "vision", label: "안내문 사진", text: "예약 날짜는 7월 29일 오전입니다.", confirmed: true },
        ];
        const validDraft = {
          summary: "복약과 재방문을 확인합니다.",
          actionItems: [{
            category: "medication", title: "혈압약 복용", detail: "혈압약은 아침 식후 복용.",
            dueDate: "", dueTime: "", priority: "low", confidence: 0.88,
            sourceText: "혈압약은 아침 식후 복용.", sourceDocumentId: "manual-memo",
          }],
          ambiguities: [], safetyFlags: [],
        };
        const valid = window.WaveLabEngine.validateLLMAnalysis(validDraft, sources);
        check(valid.valid, "valid Gemma draft must pass schema and grounding");
        check(valid.actionItems[0].sourceDocumentId === "manual-memo", "source provenance must be retained");
        const malformed = window.WaveLabEngine.validateLLMAnalysis({ actionItems: "not-an-array" }, sources);
        check(!malformed.valid, "malformed Gemma draft must fail");
        const fabricated = window.WaveLabEngine.validateLLMAnalysis({
          actionItems: [{ category: "medication", sourceText: "새로운 약을 복용", sourceDocumentId: "manual-memo", priority: "low", confidence: .9 }],
        }, sources);
        check(!fabricated.valid, "ungrounded medical text must fail");
        const result = window.WaveLabEngine.hybridStructurePipeline(sources, validDraft);
        check(result.actionItems.length >= 3, "hybrid pipeline must retain rule-based items");
        check(result.conflicts.length === 1, "conflicting revisit dates must be surfaced");
        check(!window.WaveLabEngine.classifySentence("7월 29일 예약").includes("medication"), "reservation must not be classified as medication");
        check(window.WaveLabEngine.detectPrivacyPatterns("가상 번호 010-0000-0000").some((w) => w.patternType === "mobile"), "privacy detector must remain active");
        document.body.dataset.result = failures.length ? "fail" : "pass";
        document.body.textContent = JSON.stringify({ result: document.body.dataset.result, failures });
      })();
    </script>
  </body>
</html>
